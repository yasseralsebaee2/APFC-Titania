<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Titania Web Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 42px;
      background: #000;
      display: flex;
      align-items: center;
      padding: 0 14px;
      box-sizing: border-box;
      z-index: 30;
    }

    .header img {
      height: 24px;
      width: auto;
      object-fit: contain;
      margin-right: 12px;
    }

    .header-title {
      color: white;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    #map {
      position: absolute;
      top: 42px;
      left: 0;
      width: 100%;
      height: calc(100% - 42px);
      z-index: 1;
    }

    .footer {
      display:flex;
      align-items:center;
      padding-left:14px;
      font-size:12px;
      color:#ffffff;
      font-weight:500;

      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 34px;
      background: #000;
      z-index: 50;
      pointer-events: none;
    }

    .footer-text {
      position:absolute;
      left:14px;
      font-size:12px;
      letter-spacing:0.3px;
      color:#ffffff;
    }

    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right {
      bottom: 4px !important;
      z-index: 60 !important;
    }

    .mapboxgl-ctrl-attrib {
      background: transparent !important;
      color: #fff !important;
      border-radius: 0;
      padding: 0 6px !important;
      box-shadow: none !important;
    }

    .mapboxgl-ctrl-attrib a {
      color: #fff !important;
    }

    .mapboxgl-ctrl-scale {
      background: transparent !important;
      color: #fff !important;
      border: 1px solid #fff !important;
      box-shadow: none !important;
    }

    .side-panel {
      position: absolute;
      top: 42px;
      right: 0;
      width: 360px;
      max-width: 92vw;
      height: calc(100% - 42px);
      background: rgba(255,255,255,0.98);
      box-shadow: -8px 0 24px rgba(0,0,0,0.18);
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    .side-panel.open {
      transform: translateX(0);
    }

    .side-panel-header {
      background: #272C30;
      color: #fff;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 56px;
      box-sizing: border-box;
    }

    .side-panel-header h3 {
      margin: 0;
      font-size: 18px;
      color: #ffffff;
    }

    .side-panel-close {
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .side-panel-body {
      padding: 18px;
      overflow-y: auto;
      font-size: 14px;
      color: #222;
    }

    .panel-section {
      margin-bottom: 18px;
    }

    .panel-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #272C30;
      background: #f3f4f6;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 4px solid #272C30;
    }

    .info-row {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ececec;
    }

    .info-label {
      font-size: 12px;
      color: #6b6b6b;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: #272C30;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2mGKTgmV9kgmMADAwTneh7iP9NUkM4FcGgA&s" alt="Binghatti Logo">
    <div class="header-title">Project: Titania</div>
  </div>

  <div id="map"></div>
  <div class="footer"><div class="footer-text">APFC - Titania | Pile Control Map</div></div>

  <div id="sidePanel" class="side-panel">
    <div class="side-panel-header">
      <h3 id="panelTitle">Pile Info</h3>
      <button class="side-panel-close" id="closePanel">&times;</button>
    </div>
    <div class="side-panel-body" id="panelBody"></div>
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoieWFzc2VyYWxzZWJhZWUiLCJhIjoiY20zbHdwam12MG9wdzJwczc2aGl0eTRwZCJ9.xZgmTXWHWe73-Ad1jhkmbQ';

    const csvText = `
PASTE_YOUR_CSV_HERE
`;

    const FEATURE_ID_FIELDS = ['ID','id','PileID','pileid','pile_id','name','Name'];
    const CLICKABLE_LAYER_IDS = [];

    function parseCSV(csv) {
      const lines = csv.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim());
        const row = {};
        headers.forEach((h,i)=>row[h]=values[i]??'');
        return row;
      });
    }

    function normalizeId(value){
      return String(value||'').trim().toUpperCase();
    }

    const csvRows = parseCSV(csvText);
    const pileLookup = new Map();

    csvRows.forEach(row=>{
      if(row.ID){
        pileLookup.set(normalizeId(row.ID),row);
      }
    });

    const map = new mapboxgl.Map({
      container:'map',
      style:'mapbox://styles/yasseralsebaee/cmmfw9dvc00b001ra2h2f5vrw',
      center:[55.314915,25.085616],
      zoom:14,
      pitch:0,
      bearing:0,
      antialias:true
    });

    map.addControl(new mapboxgl.NavigationControl(),'top-right');
    map.addControl(new mapboxgl.FullscreenControl(),'top-right');
    map.addControl(new mapboxgl.ScaleControl({maxWidth:120,unit:'metric'}),'bottom-right');

    const sidePanel=document.getElementById('sidePanel');
    const panelTitle=document.getElementById('panelTitle');
    const panelBody=document.getElementById('panelBody');
    const closePanel=document.getElementById('closePanel');

    closePanel.addEventListener('click',()=>{
      sidePanel.classList.remove('open');
    });

    function openPilePanelFromRow(row){
      panelTitle.textContent=row.ID||'Pile Info';

      panelBody.innerHTML=`

        <div class="panel-section">
          <div class="panel-section-title">Design</div>

          <div class="info-row"><div class="info-label">Pile ID</div><div class="info-value">${row.ID||''}</div></div>
          <div class="info-row"><div class="info-label">Type</div><div class="info-value">${row.Type||''}</div></div>
          <div class="info-row"><div class="info-label">Diameter</div><div class="info-value">${row.dia||''}</div></div>
          <div class="info-row"><div class="info-label">Top of Bar</div><div class="info-value">${row['top of bar']||''}</div></div>
          <div class="info-row"><div class="info-label">Cutoff</div><div class="info-value">${row.Cutoff||''}</div></div>
          <div class="info-row"><div class="info-label">Toe</div><div class="info-value">${row.toe||''}</div></div>
          <div class="info-row"><div class="info-label">X</div><div class="info-value">${row.X||''}</div></div>
          <div class="info-row"><div class="info-label">Y</div><div class="info-value">${row.Y||''}</div></div>

        </div>

        <div class="panel-section">
          <div class="panel-section-title">Asbuilt</div>

          <div class="info-row"><div class="info-label">Top Of Casing</div><div class="info-value">${row['Top Of Casing']||''}</div></div>
          <div class="info-row"><div class="info-label">Concrete Qty.</div><div class="info-value">${row['Concrete Qty.']||''}</div></div>
          <div class="info-row"><div class="info-label">CastingDate</div><div class="info-value">${row['CastingDate']||''}</div></div>

        </div>
      `;

      sidePanel.classList.add('open');
    }

    function getCandidateFeatures(point){
      if(CLICKABLE_LAYER_IDS.length>0){
        return map.queryRenderedFeatures(point,{layers:CLICKABLE_LAYER_IDS});
      }
      return map.queryRenderedFeatures(point);
    }

    function findMatchingCsvRowFromFeature(feature){
      if(!feature||!feature.properties) return null;

      for(const field of FEATURE_ID_FIELDS){
        const rawValue=feature.properties[field];
        if(!rawValue) continue;

        const normalized=normalizeId(rawValue);
        if(pileLookup.has(normalized)){
          return pileLookup.get(normalized);
        }
      }

      return null;
    }

    function getClickedPileRow(point){
      const features=getCandidateFeatures(point);

      for(const feature of features){
        const row=findMatchingCsvRowFromFeature(feature);
        if(row) return row;
      }

      return null;
    }

    map.on('load',()=>{
      map.easeTo({
        center:[55.314915,25.085616],
        zoom:19,
        pitch:66.5,
        bearing:17.29,
        duration:2500,
        essential:true
      });
    });

    map.on('click',(e)=>{
      const row=getClickedPileRow(e.point);
      if(row){
        openPilePanelFromRow(row);
      }
    });

    map.on('mousemove',(e)=>{
      const row=getClickedPileRow(e.point);
      map.getCanvas().style.cursor=row?'pointer':'';
    });

  </script>

</body>
</html>
