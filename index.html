`;

    const FEATURE_ID_FIELDS = ['pileid','PileID','pile_id','ID','id','name','Name'];
    const CLICKABLE_LAYER_IDS = [];

    function parseCSV(csv) {
      const lines = csv.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim());
        const row = {};
        headers.forEach((h,i)=>row[h]=values[i]??'');
        return row;
      });
    }

    function normalizeId(value){
      return String(value||'').trim().toUpperCase();
    }

    const csvRows = parseCSV(csvText);
    const pileLookup = new Map();

    csvRows.forEach(row=>{
      if(row.ID){
        pileLookup.set(normalizeId(row.ID),row);
      }
    });

    const map = new mapboxgl.Map({
      container:'map',
      style:'mapbox://styles/yasseralsebaee/cmmfw9dvc00b001ra2h2f5vrw',
      center:[55.314915,25.085616],
      zoom:14,
      pitch:0,
      bearing:0,
      antialias:true
    });

    map.addControl(new mapboxgl.NavigationControl(),'top-right');
    map.addControl(new mapboxgl.FullscreenControl(),'top-right');
    map.addControl(new mapboxgl.ScaleControl({maxWidth:120,unit:'metric'}),'bottom-right');

    const sidePanel=document.getElementById('sidePanel');
    const panelTitle=document.getElementById('panelTitle');
    const panelBody=document.getElementById('panelBody');
    const closePanel=document.getElementById('closePanel');

    closePanel.addEventListener('click',()=>{
      sidePanel.classList.remove('open');
    });

    function openPilePanelFromRow(row){
      panelTitle.textContent=row.ID||'Pile Info';

      panelBody.innerHTML=`

        <div class="panel-section">
          <div class="panel-section-title">Design</div>

          <div class="info-row"><div class="info-label">Pile ID</div><div class="info-value">${row.ID||''}</div></div>
          <div class="info-row"><div class="info-label">Type</div><div class="info-value">${row.Type||''}</div></div>
          <div class="info-row"><div class="info-label">Diameter</div><div class="info-value">${row.dia||''}</div></div>
          <div class="info-row"><div class="info-label">Top of Bar</div><div class="info-value">${row['top of bar']||''}</div></div>
          <div class="info-row"><div class="info-label">Cutoff</div><div class="info-value">${row.Cutoff||''}</div></div>
          <div class="info-row"><div class="info-label">Toe</div><div class="info-value">${row.toe||''}</div></div>
          <div class="info-row"><div class="info-label">X</div><div class="info-value">${row.X||''}</div></div>
          <div class="info-row"><div class="info-label">Y</div><div class="info-value">${row.Y||''}</div></div>

        </div>

        <div class="panel-section">
          <div class="panel-section-title">Asbuilt</div>

          <div class="info-row"><div class="info-label">Top Of Casing</div><div class="info-value">${row['Top Of Casing']||''}</div></div>
          <div class="info-row"><div class="info-label">Concrete Qty.</div><div class="info-value">${row['Concrete Qty.']||''}</div></div>
          <div class="info-row"><div class="info-label">CastingDate</div><div class="info-value">${row['CastingDate']||''}</div></div>

        </div>
      `;

      sidePanel.classList.add('open');
    }

    function getCandidateFeatures(point){
      if(CLICKABLE_LAYER_IDS.length>0){
        return map.queryRenderedFeatures(point,{layers:CLICKABLE_LAYER_IDS});
      }
      return map.queryRenderedFeatures(point);
    }

    function findMatchingCsvRowFromFeature(feature){
      if(!feature || !feature.properties) return null;

      for(const field of FEATURE_ID_FIELDS){
        const rawValue = feature.properties[field];
        if(rawValue === undefined || rawValue === null || rawValue === '') continue;

        const normalized = normalizeId(rawValue);
        if(pileLookup.has(normalized)){
          return pileLookup.get(normalized);
        }
      }

      return null;
    }

    function getClickedPileRow(point){
      const features = getCandidateFeatures(point);

      const prioritized = features
        .filter(feature => {
          if(!feature || !feature.properties) return false;
          return FEATURE_ID_FIELDS.some(field => {
            const value = feature.properties[field];
            return value !== undefined && value !== null && value !== '';
          });
        })
        .map(feature => {
          let layerPriority = 3;
          const layerType = feature.layer && feature.layer.type ? feature.layer.type : '';

          if (layerType === 'circle') layerPriority = 0;
          else if (layerType === 'fill') layerPriority = 1;
          else if (layerType === 'line') layerPriority = 2;
          else if (layerType === 'symbol') layerPriority = 4;

          let screenDistance = Number.MAX_SAFE_INTEGER;
          try {
            if (feature.geometry && feature.geometry.type === 'Point' && Array.isArray(feature.geometry.coordinates)) {
              const projected = map.project(feature.geometry.coordinates);
              screenDistance = Math.hypot(projected.x - point.x, projected.y - point.y);
            }
          } catch (err) {}

          return {
            feature,
            layerPriority,
            screenDistance
          };
        })
        .sort((a, b) => {
          if (a.layerPriority !== b.layerPriority) return a.layerPriority - b.layerPriority;
          return a.screenDistance - b.screenDistance;
        });

      for (const item of prioritized) {
        const row = findMatchingCsvRowFromFeature(item.feature);
        if (row) return row;
      }

      return null;
    }

    map.on('load',()=>{
      map.easeTo({
        center:[55.314915,25.085616],
        zoom:19,
        pitch:66.5,
        bearing:17.29,
        duration:2500,
        essential:true
      });
    });

        let touchStartPoint = null;
    let touchMoved = false;
    let touchIsSingleTapCandidate = false;
    let suppressClickUntil = 0;
    const TAP_MOVE_TOLERANCE = 10;
    const TAP_MAX_DURATION = 220;
    let touchStartTime = 0;

    const canvas = map.getCanvas();

    canvas.addEventListener('touchstart', (ev) => {
      if (!ev.touches || ev.touches.length !== 1) {
        touchStartPoint = null;
        touchMoved = true;
        touchIsSingleTapCandidate = false;
        suppressClickUntil = Date.now() + 500;
        return;
      }

      const t = ev.touches[0];
      touchStartPoint = { x: t.clientX, y: t.clientY };
      touchMoved = false;
      touchIsSingleTapCandidate = true;
      touchStartTime = Date.now();
    }, { passive: true });

    canvas.addEventListener('touchmove', (ev) => {
      if (!touchStartPoint || !ev.touches || ev.touches.length !== 1) {
        touchMoved = true;
        touchIsSingleTapCandidate = false;
        return;
      }

      const t = ev.touches[0];
      const dx = t.clientX - touchStartPoint.x;
      const dy = t.clientY - touchStartPoint.y;

      if (Math.hypot(dx, dy) > TAP_MOVE_TOLERANCE) {
        touchMoved = true;
        touchIsSingleTapCandidate = false;
      }
    }, { passive: true });

    canvas.addEventListener('touchend', (ev) => {
      if (!touchStartPoint) {
        suppressClickUntil = Date.now() + 500;
        return;
      }

      const duration = Date.now() - touchStartTime;
      if (!touchIsSingleTapCandidate || touchMoved || duration > TAP_MAX_DURATION) {
        touchStartPoint = null;
        touchIsSingleTapCandidate = false;
        suppressClickUntil = Date.now() + 500;
        return;
      }

      const changedTouch = ev.changedTouches && ev.changedTouches[0];
      if (!changedTouch) {
        touchStartPoint = null;
        touchIsSingleTapCandidate = false;
        suppressClickUntil = Date.now() + 500;
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const point = {
        x: changedTouch.clientX - rect.left,
        y: changedTouch.clientY - rect.top
      };

      const row = getClickedPileRow(point);
      if (row) {
        openPilePanelFromRow(row);
      }

      touchStartPoint = null;
      touchIsSingleTapCandidate = false;
      suppressClickUntil = Date.now() + 500;
    }, { passive: true });

    ['dragstart','zoomstart','rotatestart','pitchstart'].forEach(eventName => {
      map.on(eventName, () => {
        suppressClickUntil = Date.now() + 500;
        touchIsSingleTapCandidate = false;
      });
    });

    map.on('click',(e)=>{
      if (Date.now() < suppressClickUntil) return;
      const row = getClickedPileRow(e.point);
      if(row){
        openPilePanelFromRow(row);
      }
    });

    map.on('mousemove',(e)=>{
      const row=getClickedPileRow(e.point);
      map.getCanvas().style.cursor=row?'pointer':'';
    });

  </script>
