        wrap.appendChild(idEl);
        wrap.appendChild(typeEl);

        const marker = new mapboxgl.Marker({
          element: wrap,
          anchor: 'center',
          offset: [0, 0]
        })
        .setLngLat(record.lngLat)
        .addTo(map);

        htmlPileLabels.push(marker);
      });
    }

    async function init() {
      const scope = getActiveScope();
      if (!scope) return false;

      const res = await fetch(JSON_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const rawPiles = Array.isArray(data) ? data : (data.piles || []);
      allPiles = rawPiles;
      pileRecords = buildPileRecords(allPiles);
      chartData = aggregateDailyData(allPiles);
      SITE_CENTER = getPileCentroid(pileRecords);
      map.setCenter(SITE_CENTER);
      if (!pileLayer) {
        pileLayer = new ThreePileLayer('threejs-piles');
      }
      return true;
    }

    function bootstrapMapContent() {
      if (mapContentBootstrapped) return;
      mapContentBootstrapped = true;
      applyProgressCollapsedState();
      applyChartCollapsedState();
      bindVisibilityControls();
      applyVisibilityCollapsedState();
      finalizeStyleLoad();
      map.once('idle', () => {
        focusCurrentProject(false);
        map.once('moveend', () => {
          if (initialProjectZoomApplied) return;
          initialProjectZoomApplied = true;
          map.easeTo({
            zoom: map.getZoom() + 0.18,
            duration: 420,
            essential: true
          });
        });
      });
    }

    function showMapWaitingState(message = 'Waiting for dashboard context...') {
      panelTitle.textContent = 'Project Map';
      panelBody.innerHTML = `<div class="panel-section"><div class="panel-section-title">Status</div><div class="info-row"><div class="info-label">Message</div><div class="info-value">${escapeHtml(message)}</div></div></div>`;
      sidePanel.classList.add('open');
    }

    async function loadMapDataForCurrentScope() {
      const loaded = await init();
      if (!loaded) {
        showMapWaitingState();
        return false;
      }
      sidePanel.classList.remove('open');
      if (map.loaded()) {
        bootstrapMapContent();
      } else {
        map.once('load', bootstrapMapContent);
      }
      return true;
    }

    loadMapDataForCurrentScope().catch(err => {
      console.error(err);
      panelTitle.textContent = 'Load error';
      panelBody.innerHTML = `<div class="panel-section"><div class="panel-section-title">Error</div><div class="info-row"><div class="info-label">Message</div><div class="info-value">${escapeHtml(err.message || String(err))}</div></div></div>`;
      sidePanel.classList.add('open');
    });

    map.on('click', e => {
      const record = getPileRecordFromInteraction(e.point, 38);
      if (!record) return;
      if (pileLayer) pileLayer.setHighlightedPile(record.id);
      openPilePanel(record);
    });

    map.on('dragstart', () => {
      isMapInteracting = true;
      if (pileLayer) pileLayer.setHoverPile(null);
      map.getCanvas().style.cursor = '';
    });
    map.on('rotatestart', () => {
      isMapInteracting = true;
      if (pileLayer) pileLayer.setHoverPile(null);
      map.getCanvas().style.cursor = '';
    });
    map.on('pitchstart', () => {
      isMapInteracting = true;
      if (pileLayer) pileLayer.setHoverPile(null);
      map.getCanvas().style.cursor = '';
    });
    map.on('moveend', () => {
      isMapInteracting = false;
    });
    map.on('mousemove', e => {
      if (isMapInteracting) return;
      if (hoverRaf) return;
      const point = { x: e.point.x, y: e.point.y };
      hoverRaf = requestAnimationFrame(() => {
        hoverRaf = 0;
        if (isMapInteracting) return;
        const record = getPileRecordFromInteraction(point, 26);
        const nextId = record ? record.id : null;
        if (nextId === lastHoverRecordId) return;
        lastHoverRecordId = nextId;
        if (pileLayer) pileLayer.setHoverPile(nextId);
        map.getCanvas().style.cursor = record ? 'pointer' : '';
      });
    });
    map.on('mouseleave', () => {
      lastHoverRecordId = null;
      if (pileLayer) pileLayer.setHoverPile(null);
      map.getCanvas().style.cursor = '';
    });
    map.on('style.load', () => {
      syncSatelliteButtonUi();
      finalizeStyleLoad();
    });

    window.addEventListener('message', event => {
      if (event.origin !== window.location.origin) return;
      if (event.data?.type === 'MAP_FOCUS_ANIMATE') {
        try {
          map.resize();
          const mode = view3DBtn.classList.contains('active') ? '3d' : '2d';
          setTimeout(() => setMapView(mode, { instant: false }), 40);
        } catch (err) {}
        return;
      }
        if (event.data?.type === 'AUTH_CONTEXT_UPDATED') {
          const payload = event.data?.payload;
          if (payload && typeof payload === 'object') {
            try {
              const storedRaw = window.localStorage.getItem(AUTH_STORAGE_KEY);
            const stored = storedRaw ? JSON.parse(storedRaw) : {};
            const merged = {
              ...stored,
              ...payload,
              selectedProject: payload.project || stored.selectedProject || stored.project,
              selectedPlot: payload.plot || stored.selectedPlot || stored.plot
            };
              window.localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(merged));
            } catch (err) {}
          }
          try {
            if (!allPiles.length) {
              loadMapDataForCurrentScope().catch(err => {
                console.error(err);
                panelTitle.textContent = 'Load error';
                panelBody.innerHTML = `<div class="panel-section"><div class="panel-section-title">Error</div><div class="info-row"><div class="info-label">Message</div><div class="info-value">${escapeHtml(err.message || String(err))}</div></div></div>`;
                sidePanel.classList.add('open');
              });
              return;
            }
            if (allPiles.length) {
              pileRecords = buildPileRecords(allPiles);
              chartData = aggregateDailyData(allPiles);
              if (pileLayer) {
                pileLayer.buildPiles();
                refreshPileAppearance();
                addLabelLayer();
              }
            }
            sidePanel.classList.remove('open');
            setTimeout(() => focusCurrentProject(false), 40);
          } catch (err) {}
          return;
        }
    });
  </script>
</body>
</html>
