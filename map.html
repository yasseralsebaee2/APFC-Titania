<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>APFC - Titania | 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <style>
    :root {
      --dark: #272C30;
      --gold: #E8D611;
      --green: #50C878;
      --text: #272C30;
      --premium-green: #11ee89;
      --premium-amber: #ffb02e;
      --premium-ice: #eff6fb;
      --glass-dark: rgba(9, 13, 17, 0.48);
      --glass-border: rgba(255,255,255,0.16);
      --glass-shadow: 0 18px 46px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
      --glass-blur: blur(18px) saturate(1.18);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,244,221,0.95) 0%, rgba(233,241,250,0.82) 32%, rgba(191,208,226,0.42) 56%, rgba(18,24,31,0.92) 100%);
    }
    .header {
      position: absolute; top: 0; left: 0; width: 100%; height: 42px;
      background: #000; display: flex; align-items: center; padding: 0 14px; z-index: 30;
    }
    .header img { height: 24px; width: auto; object-fit: contain; margin-right: 12px; }
    .header-title { color: #fff; font-size: 14px; font-weight: 500; letter-spacing: 0.3px; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.96; }
    .map-vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 54%, rgba(5,8,12,0.22) 100%),
        linear-gradient(180deg, rgba(5,8,12,0.08) 0%, rgba(5,8,12,0) 24%, rgba(5,8,12,0.14) 100%);
      mix-blend-mode: multiply;
    }
    .footer {
      display: flex; align-items: center; padding-left: 14px; font-size: 12px; color: #fff;
      font-weight: 500; position: absolute; left: 0; bottom: 0; width: 100%; height: 34px;
      background: #000; z-index: 50; pointer-events: none;
    }
    .footer-text { position: absolute; left: 14px; font-size: 12px; letter-spacing: 0.3px; color: #fff; }

    .tests-legend {
      position: absolute;
      right: 16px;
      bottom: 48px;
      z-index: 46;
      min-width: 150px;
      padding: 10px 12px;
      border-radius: 16px;
      color: #fff;
    }
    .tests-legend-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    .tests-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 6px;
    }
    .tests-legend-row:last-child { margin-bottom: 0; }
    .tests-legend-swatch {
      width: 22px;
      height: 22px;
      position: relative;
      flex: 0 0 22px;
    }
    .tests-legend-swatch.circle::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 2px solid #2D7FF9;
      border-radius: 50%;
    }
    .tests-legend-swatch.rectangle::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 2px solid #B784D7;
      border-radius: 3px;
    }
    .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { bottom: 4px !important; z-index: 60 !important; }
    .mapboxgl-ctrl-attrib {
      background: transparent !important; color: #fff !important; border-radius: 0;
      padding: 0 6px !important; box-shadow: none !important;
    }
    .mapboxgl-ctrl-attrib a { color: #fff !important; }
    .mapboxgl-ctrl-scale {
      background: transparent !important; color: #fff !important; border: 1px solid #fff !important; box-shadow: none !important;
    }
    .glass-card {
      background: var(--glass-dark); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); color: #fff; border-radius: 18px; overflow: hidden;
    }

    .progress-card {
      position: absolute; top: 16px; left: 16px; width: 250px; z-index: 46;
      transition: max-height 0.22s ease; max-height: 220px;
    }
    .progress-card.collapsed { max-height: 50px; overflow: hidden; }
    .progress-card-header {
      position: relative; padding: 12px 14px 6px 14px; min-height: 50px;
    }
    .progress-card-title { font-size: 13px; font-weight: 700; color: #fff; }
    .progress-card-subtitle { font-size: 10px; color: rgba(255,255,255,0.74); margin-top: 2px; }
    .progress-card-body { display: flex; align-items: center; gap: 14px; padding: 4px 14px 14px 14px; }
    .progress-ring-wrap { position: relative; width: 84px; height: 84px; flex: 0 0 84px; }
    .progress-ring-svg { width: 84px; height: 84px; transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 8; }
    .progress-ring-value {
      fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease; filter: drop-shadow(0 0 8px rgba(232,214,17,0.22));
    }
    .progress-ring-center {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; pointer-events: none;
    }
    .progress-percent { font-size: 17px; font-weight: 700; color: #fff; line-height: 1; }
    .progress-percent-sub { font-size: 9px; color: rgba(255,255,255,0.65); margin-top: 3px; }
    .progress-stats { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .progress-stat { display: flex; justify-content: space-between; gap: 16px; }
    .progress-stat-label { font-size: 11px; color: rgba(255,255,255,0.72); }
    .progress-stat-value { font-size: 12px; font-weight: 700; color: #fff; }

    .right-controls {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      z-index: 47; display: flex; flex-direction: column; gap: 8px; align-items: stretch;
    }
    .view-switcher {
      position: relative; right: auto; top: auto; transform: none;
      z-index: 47; display: flex; flex-direction: column; gap: 5px; padding: 5px;
    }
    .view-btn {
      border: 1px solid rgba(255,255,255,0.16); background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.055)); color: #fff;
      border-radius: 999px; padding: 5px 9px; font-size: 9px; font-weight: 800; cursor: pointer;
      min-width: 48px;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .view-btn:hover { background: rgba(255,255,255,0.16); }
    .view-btn.active {
      background: linear-gradient(135deg, #fff26b 0%, #e9d80d 58%, #c8b900 100%);
      border-color: rgba(255,242,107,0.95); color: #070907;
      box-shadow: 0 8px 24px rgba(232,214,17,0.26), inset 0 1px 0 rgba(255,255,255,0.42);
    }

    .status-legend {
      position: absolute;
      right: 16px;
      bottom: 150px;
      z-index: 46;
      min-width: 150px;
      padding: 9px 11px;
      border-radius: 15px;
    }
    .status-legend-title {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      margin-bottom: 7px;
    }
    .status-legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.84);
      margin-bottom: 5px;
    }
    .status-legend-row:last-child { margin-bottom: 0; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: 0 0 18px currentColor;
      flex: 0 0 10px;
    }
    .status-dot.executed { color: var(--premium-green); background: var(--premium-green); }
    .status-dot.yesterday { color: var(--premium-amber); background: var(--premium-amber); }
    .status-dot.remaining { color: rgba(239,246,251,0.74); background: rgba(239,246,251,0.74); }

    .visibility-card { position: relative; right: auto; top: auto; width: 220px; z-index: 46; }
    .visibility-card.compact {
      width: auto;
      min-width: 56px;
      overflow: visible;
    }
    .visibility-header { padding: 12px 14px 8px 14px; font-size: 13px; font-weight: 700; }
    .visibility-body { padding: 0 14px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .visibility-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .visibility-label { font-size: 11px; color: rgba(255,255,255,0.82); }
    .visibility-value { font-size: 11px; color: rgba(255,255,255,0.62); }
    .visibility-slider { width: 100%; accent-color: var(--gold); }

    .chart-card {
      position: absolute; left: 16px; bottom: 48px; width: 365px; max-width: calc(100vw - 32px);
      z-index: 45; transition: max-height 0.22s ease; max-height: 420px;
      display: none !important;
    }
    .chart-card.collapsed { max-height: 50px; overflow: hidden; }
    .chart-card-header {
      position: relative; display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px 14px 8px 14px; min-height: 50px;
    }
    .chart-title-wrap { display: flex; flex-direction: column; gap: 2px; padding-right: 76px; }
    .chart-title { font-size: 13px; font-weight: 700; color: #fff; }
    .chart-subtitle { font-size: 10px; color: rgba(255,255,255,0.72); }
    .chart-toggle-btn {
      position: absolute; right: 10px; top: 10px; z-index: 3; border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08); color: #fff; border-radius: 999px; padding: 6px 9px;
      font-size: 10px; font-weight: 700; cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .progress-toggle-btn {
      position: absolute; right: 10px; top: 10px; z-index: 3; border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08); color: #fff; border-radius: 999px; padding: 6px 9px;
      font-size: 10px; font-weight: 700; cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .chart-content { position: relative; }
    .chart-mode-switcher, .chart-switcher { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 10px 14px; }
    .chart-mode-btn, .chart-btn {
      border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: #ffffff;
      border-radius: 999px; padding: 7px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.18s ease; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .chart-mode-btn.active, .chart-btn.active { background: var(--gold); color: #000000; border-color: var(--gold); }
    .chart-body { padding: 0 12px 12px 12px; }
    .chart-metrics { display: flex; align-items: center; justify-content: space-between; padding: 0 2px 8px 2px; gap: 12px; }
    .chart-metric-label { font-size: 10px; color: rgba(255,255,255,0.72); margin-bottom: 3px; }
    .chart-metric-value { font-size: 16px; font-weight: 700; color: #ffffff; }
    .chart-area {
      position: relative; width: 100%; height: 185px; border-radius: 14px; background: rgba(255,255,255,0.03);
      overflow: visible; border: 1px solid rgba(255,255,255,0.10);
    }
    .chart-svg { width: 100%; height: 100%; display: block; }
    .chart-legend {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      padding-top: 8px; color: rgba(255,255,255,0.82); font-size: 10px;
    }
    .chart-pill { display: inline-flex; align-items: center; gap: 6px; }
    .chart-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); display: inline-block; }

    .progress-tooltip, .chart-tooltip {
      position: absolute; pointer-events: none; opacity: 0; transform: translateY(6px);
      transition: opacity 0.14s ease, transform 0.14s ease; background: rgba(12,12,12,0.78); color: #fff;
      border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 10px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      min-width: 160px; z-index: 80;
    }
    .progress-tooltip.show, .chart-tooltip.show { opacity: 1; transform: translateY(0); }
    .tooltip-title { font-size: 11px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .tooltip-row { display: flex; justify-content: space-between; gap: 16px; font-size: 11px; color: rgba(255,255,255,0.88); margin-bottom: 4px; }
    .tooltip-row:last-child { margin-bottom: 0; }
    .tooltip-label { color: rgba(255,255,255,0.62); }

    .side-panel {
      position: absolute; top: 50px; right: 10px; width: 320px; max-width: min(92vw, 320px);
      max-height: calc(100% - 96px); background: rgba(255,255,255,0.94); box-shadow: 0 16px 36px rgba(0,0,0,0.18);
      border: 1px solid rgba(39,44,48,0.08); z-index: 70; transform: translateX(calc(100% + 14px));
      transition: transform 0.22s ease, opacity 0.22s ease; display: flex; flex-direction: column;
      border-radius: 20px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); overflow: hidden; opacity: 0;
    }
    .side-panel.open { transform: translateX(0); opacity: 1; }
    .side-panel-header {
      background: linear-gradient(180deg, rgba(39,44,48,0.98) 0%, rgba(39,44,48,0.92) 100%);
      color: #fff; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; min-height: 54px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .side-panel-header h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
    .side-panel-close {
      width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08);
      color: #fff; border-radius: 999px; font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    }
    .side-panel-body {
      padding: 12px; overflow-y: auto; font-size: 13px; color: #222;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(248,249,251,0.94) 100%);
    }
    .panel-section {
      margin-bottom: 12px; background: rgba(255,255,255,0.72); border: 1px solid rgba(39,44,48,0.06);
      border-radius: 14px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    .panel-section-title {
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--dark);
      background: rgba(39,44,48,0.06); padding: 9px 12px; border-bottom: 1px solid rgba(39,44,48,0.06);
    }
    .info-row {
      display: grid; grid-template-columns: 112px 1fr; gap: 10px; align-items: start; padding: 9px 12px;
      border-bottom: 1px solid rgba(39,44,48,0.06);
    }
    .info-row:last-child { border-bottom: 0; }
    .info-label { font-size: 11px; color: #7a8087; font-weight: 600; line-height: 1.35; }
    .info-value { font-size: 12.5px; font-weight: 700; color: var(--text); line-height: 1.35; text-align: right; word-break: break-word; }


    .pile-label-marker {
      pointer-events: none;
      position: relative;
      width: 90px;
      height: 0;
      white-space: nowrap;
      user-select: none;
    }
    .pile-label-id,
    .pile-label-type {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.45),
        0 0 8px rgba(255,255,255,0.58),
        0 2px 5px rgba(0,0,0,0.18);
      font-family: Arial, sans-serif;
    }
    .pile-label-id {
      top: -7px;
      transform: translate(-50%, -100%);
      font-size: 10px;
      line-height: 1;
      font-weight: 400;
      color: #0f151b;
    }
    .pile-label-type {
      top: 7px;
      font-size: 10.5px;
      line-height: 1;
      font-weight: 400;
      color: #0073ff;
    }

    @media (max-width: 640px) {
      .progress-card, .chart-card { display: none !important; }
      .header { height: 40px; padding: 0 10px; }
      .header img { height: 20px; margin-right: 8px; }
      .header-title { font-size: 11px; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #map { top: 0; height: 100%; }
      .footer { height: 32px; }
      .footer-text { left: 10px; right: 10px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .progress-card, .visibility-card { width: calc(50vw - 12px); min-width: 0; border-radius: 16px; }
      .progress-card { top: 48px; left: 8px; }
      .visibility-card { width: auto; min-width: 60px; }
      .progress-card-header, .visibility-header { padding: 10px 10px 6px 10px; }
      .progress-card-title, .visibility-header { font-size: 11px; }
      .progress-card-subtitle, .visibility-label, .visibility-value, .progress-stat-label { font-size: 9px; }
      .progress-card-body { gap: 8px; padding: 2px 10px 10px 10px; }
      .progress-ring-wrap, .progress-ring-svg { width: 64px; height: 64px; flex: 0 0 64px; }
      .progress-percent { font-size: 13px; }
      .progress-percent-sub { font-size: 8px; }
      .progress-stats { gap: 5px; }
      .progress-stat-value { font-size: 10px; }
      .visibility-body { padding: 0 10px 10px 10px; gap: 6px; }
      .visibility-slider { height: 18px; }
      .chart-card { width: calc(100vw - 16px); left: 8px; bottom: calc(38px + env(safe-area-inset-bottom)); border-radius: 16px; }

      .tests-legend { right: 8px; bottom: calc(38px + env(safe-area-inset-bottom)); min-width: 132px; padding: 9px 10px; border-radius: 14px; }
      .status-legend { display: none !important; }
      .tests-legend-title { font-size: 10px; margin-bottom: 6px; }
      .tests-legend-row { font-size: 9px; gap: 6px; margin-bottom: 5px; }
      .tests-legend-swatch { width: 18px; height: 18px; flex-basis: 18px; }
      .chart-card-header { padding: 10px 12px 8px 12px; min-height: 46px; }
      .chart-title-wrap { padding-right: 62px; }
      .chart-title { font-size: 12px; }
      .chart-subtitle { font-size: 9px; }
      .chart-toggle-btn { right: 8px; top: 8px; padding: 5px 8px; font-size: 9px; }
      .progress-toggle-btn { right: 8px; top: 8px; padding: 5px 8px; font-size: 9px; }
      .chart-mode-switcher, .chart-switcher { padding: 0 12px 8px 12px; gap: 5px; }
      .chart-mode-btn, .chart-btn { font-size: 10px; padding: 6px 9px; }
      .chart-body { padding: 0 10px 10px 10px; }
      .chart-area { height: 160px; }
      .chart-metric-label, .chart-legend { font-size: 9px; }
      .chart-metric-value { font-size: 14px; }
      .right-controls {
        right: 8px;
        top: 50%;
        bottom: auto;
        transform: translateY(-50%);
      }
      .view-switcher { top: auto; right: auto; bottom: auto; transform: none; padding: 4px; gap: 5px; border-radius: 16px; }
      .view-btn { min-width: 46px; padding: 6px 8px; font-size: 9px; }
      .side-panel { top: 46px; right: 8px; left: 8px; width: auto; max-width: none; max-height: calc(100% - 92px); border-radius: 18px; transform: translateY(calc(100% + 16px)); }
      .side-panel.open { transform: translateY(0); }
      .info-row { grid-template-columns: 92px 1fr; gap: 8px; padding: 8px 10px; }
      .info-label { font-size: 10px; }
      .info-value { font-size: 11px; }
      .pile-label-marker { width: 72px; }
      .pile-label-id { top: -6px; font-size: 9px; }
      .pile-label-type { top: 6px; font-size: 9px; }
    }

    @media (max-height: 480px) and (orientation: landscape) {
      .progress-card, .chart-card { display: none !important; }
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div class="map-vignette" aria-hidden="true"></div>

  <div class="progress-card glass-card" id="progressCard">
    <div class="progress-card-header">
      <div class="progress-card-title">Overall Progress</div>
      <div class="progress-card-subtitle">Executed piles vs total piles</div>
      <button class="progress-toggle-btn" id="progressToggleBtn" type="button">Hide</button>
    </div>
    <div class="progress-card-body">
      <div class="progress-ring-wrap">
        <svg class="progress-ring-svg" viewBox="0 0 100 100">
          <circle class="progress-ring-bg" cx="50" cy="50" r="40"></circle>
          <circle class="progress-ring-value" id="progressRingValue" cx="50" cy="50" r="40"></circle>
        </svg>
        <div class="progress-ring-center">
          <div class="progress-percent" id="progressPercent">0%</div>
          <div class="progress-percent-sub">Complete</div>
        </div>
      </div>
      <div class="progress-stats">
        <div class="progress-stat"><span class="progress-stat-label">Executed</span><span class="progress-stat-value" id="progressExecuted">0</span></div>
        <div class="progress-stat"><span class="progress-stat-label">Remaining</span><span class="progress-stat-value" id="progressRemaining">0</span></div>
        <div class="progress-stat"><span class="progress-stat-label">Total</span><span class="progress-stat-value" id="progressTotal">0</span></div>
      </div>
    </div>
    
  </div>

  <div class="right-controls">
    <div class="view-switcher glass-card">

    function normalizeText(value) {
      return String(value || '').trim();
    }

    function isAllPlotsValue(value) {
      const normalized = normalizeText(value).toLowerCase();
      return !normalized || normalized === '-' || normalized === '—' || normalized === 'all' || normalized === 'all plots' || normalized === 'all plot';
    }

    function getStoredAuthContext() {
      try {
        const raw = window.localStorage.getItem(AUTH_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch {
        return null;
      }
    }

    function getActiveScope() {
      const stored = getStoredAuthContext();
      if (!stored?.project && !stored?.selectedProject) return null;
      const selectedProject = normalizeText(stored.selectedProject);
      const userProject = normalizeText(stored.project);
      const effectiveProject = selectedProject || (userProject.toLowerCase() === 'all' ? DEFAULT_PROJECT : userProject) || DEFAULT_PROJECT;
      return {
        project: effectiveProject,
        plot: normalizeText(stored.selectedPlot || stored.plot)
      };
    }

    function matchesScope(row, scope) {
      const projectMatch = normalizeText(row.project) === normalizeText(scope.project);
      const plotMatch = isAllPlotsValue(scope.plot) || normalizeText(row.plot) === normalizeText(scope.plot);
      return projectMatch && plotMatch;
    }

    function getFocusedPiles(scope) {
      if (!scope) return allPiles;
      const scoped = allPiles.filter(row => matchesScope(row, scope));
      return scoped.length ? scoped : allPiles;
    }

    function getFocusedWidgetPiles() {
      return getFocusedPiles(getActiveScope());
    }

    function parseNumber(value) {
      if (value === undefined || value === null || value === '') return 0;
      const n = Number(String(value).replace(/,/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }
    function displayValue(value, digits = 2) {
      if (value === undefined || value === null || value === '') return '—';
      const n = Number(value);
      if (!Number.isFinite(n)) return String(value);
      return n.toLocaleString(undefined, { maximumFractionDigits: digits });
    }
    function displayFixed(value, digits = 3) {
      if (value === undefined || value === null || value === '') return '—';
      const n = Number(value);
      if (!Number.isFinite(n)) return String(value);
      return n.toLocaleString('en-US', {
        useGrouping: false,
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }
    function displaySigned(value, digits = 2) {
      if (value === undefined || value === null || value === '') return '—';
      const n = Number(value);
      if (!Number.isFinite(n)) return String(value);
      return `${n >= 0 ? '+' : '-'}${Math.abs(n).toFixed(digits)}`;
    }
    function normalizeId(value) { return String(value || '').trim().toUpperCase(); }

    function dltmToWgs84(x, y) {
      try {
        const converted = proj4('EPSG:3997', 'WGS84', [Number(x), Number(y)]);
        return Array.isArray(converted) && converted.length === 2 ? converted : null;
      } catch (err) {
        return null;
      }
    }

    function normalizeDateString(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const d = new Date(raw);
      if (!isNaN(d)) {
        const y = d.getUTCFullYear();
        const m = String(d.getUTCMonth() + 1).padStart(2, '0');
        const da = String(d.getUTCDate()).padStart(2, '0');
        return `${y}-${m}-${da}`;
      }
      return '';
    }

    function formatDateLabel(value) {
      if (!value) return '—';
      const d = new Date(value);
      if (!isNaN(d)) return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit', timeZone: 'UTC' });
      return String(value);
    }
    function formatDateTime(value) {
      if (!value) return '—';
      const d = new Date(value);
      if (!isNaN(d)) {
        return d.toLocaleString('en-GB', {
          year: 'numeric', month: 'short', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
      }
      return String(value);
    }
    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function isExecutedRow(row) { return !!row.isExecuted; }
    function getPileDepth(row) {
      return isExecutedRow(row) ? parseNumber(row.asbuilt_depth) : parseNumber(row.design_depth);
    }
    function getVisiblePileHeight(row) { return getPileDepth(row); }
    function getPileRadiusMeters(row) {
      const diaMm = parseNumber(row.diameter);
      const actualRadius = diaMm > 0 ? diaMm / 2000 : 0.5;
      return Math.max(actualRadius * DISPLAY_RADIUS_SCALE, MIN_DISPLAY_RADIUS_M);
    }


    function normalizeTestsValue(value) {
      return String(value || '').trim().toLowerCase();
    }
    function getTestType(row) {
      const raw = normalizeTestsValue(row.tests);
      if (!raw) return '';
      if (raw.includes('sonic')) return 'sonic';
      if (raw.includes('dynamic')) return 'dynamic';
      return '';
    }
    function buildCirclePolygonFromProjected(x, y, radiusM, steps = 64) {
      if (!Number.isFinite(Number(x)) || !Number.isFinite(Number(y)) || !Number.isFinite(Number(radiusM)) || Number(radiusM) <= 0) return null;
      const coords = [];
      for (let i = 0; i <= steps; i++) {
        const angle = (i / steps) * Math.PI * 2;
        const px = Number(x) + Math.cos(angle) * Number(radiusM);
        const py = Number(y) + Math.sin(angle) * Number(radiusM);
        const lngLat = dltmToWgs84(px, py);
        if (!lngLat) return null;
        coords.push(lngLat);
      }
      return {
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: [coords]
        }
      };
    }
    function buildRectanglePolygonFromProjected(x, y, halfSizeM) {
      if (!Number.isFinite(Number(x)) || !Number.isFinite(Number(y)) || !Number.isFinite(Number(halfSizeM)) || Number(halfSizeM) <= 0) return null;
      const corners = [
        [Number(x) - Number(halfSizeM), Number(y) - Number(halfSizeM)],
        [Number(x) + Number(halfSizeM), Number(y) - Number(halfSizeM)],
        [Number(x) + Number(halfSizeM), Number(y) + Number(halfSizeM)],
        [Number(x) - Number(halfSizeM), Number(y) + Number(halfSizeM)],
        [Number(x) - Number(halfSizeM), Number(y) - Number(halfSizeM)]
      ];
      const lngLats = [];
      for (const [px, py] of corners) {
        const lngLat = dltmToWgs84(px, py);
        if (!lngLat) return null;
        lngLats.push(lngLat);
      }
      return {
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: [lngLats]
        }
      };
    }
    function buildTestShapeFeatures(rows) {
      const features = [];
      rows.forEach(row => {
        const testType = getTestType(row);
        if (!testType) return;
        const baseRadius = getPileRadiusMeters(row) * 1.16;
        const feature = testType === 'dynamic'
          ? buildRectanglePolygonFromProjected(row.design_x, row.design_y, baseRadius)
          : buildCirclePolygonFromProjected(row.design_x, row.design_y, baseRadius, 72);
        if (!feature) return;
        feature.properties = {
          id: normalizeId(row.id),
          testType
        };
        features.push(feature);
      });
      return features;
    }
    function addTestRings() {
      const sourceId = 'pile-test-rings';
      const layerId = 'pile-test-rings-line';
      if (map.getLayer(layerId)) map.removeLayer(layerId);
      if (map.getSource(sourceId)) map.removeSource(sourceId);
      const features = buildTestShapeFeatures(allPiles);
      if (!features.length) return;
      const data = {
        type: 'FeatureCollection',
        features
      };
      map.addSource(sourceId, { type: 'geojson', data });
      map.addLayer({
        id: layerId,
        type: 'line',
        source: sourceId,
        layout: {
          'line-join': 'round',
          'line-cap': 'round'
        },
        paint: {
          'line-color': [
            'match',
            ['get', 'testType'],
            'sonic', '#2D7FF9',
            'dynamic', '#B784D7',
            '#2D7FF9'

          'line-width': [
            'interpolate',
            ['linear'],
            ['zoom'],
            16, 1.5,
            18, 2.2,
            20, 3.4,
            22, 5.2
          ],
          'line-opacity': 0.95
        }
      });
    }
    function getExecutionDateKey(row) {
      const concreteEndRaw = row?.asbuilt_concreteEnd || row?.asbuilt_concreteend || row?.asbuilt_ConcreteEnd;
      const concreteEnd = concreteEndRaw ? new Date(concreteEndRaw) : null;

      if (concreteEnd instanceof Date && !Number.isNaN(concreteEnd.getTime())) {
        const d = new Date(concreteEnd);
        const totalMinutes = d.getUTCHours() * 60 + d.getUTCMinutes();
        if (totalMinutes < (7 * 60)) {
          d.setUTCDate(d.getUTCDate() - 1);
        }
        return d.toISOString().slice(0, 10);
      }

      return normalizeDateString(
        row?.castingDate ||
        row?.asbuilt_concreteStart
      );
    }

    function getLatestExecutionDateKey(rows) {
      let latestKey = '';
      (Array.isArray(rows) ? rows : []).forEach(row => {
        if (!isExecutedRow(row)) return;
        const executionKey = getExecutionDateKey(row);
        if (executionKey && (!latestKey || executionKey > latestKey)) {
          latestKey = executionKey;
        }
      });
      return latestKey;
    }

    function isYesterdayExecutedRow(row, latestExecutionKey) {
      return !!latestExecutionKey && isExecutedRow(row) && getExecutionDateKey(row) === latestExecutionKey;
    }

    function getPileColor(row, latestExecutionKey) {
      return isYesterdayExecutedRow(row, latestExecutionKey)
        ? MAP_PREMIUM.colors.yesterday
        : (isExecutedRow(row) ? MAP_PREMIUM.colors.executed : MAP_PREMIUM.colors.remaining);
    }
    function getBaseOpacityForRecord(record) {
      if (record?.executedYesterday) return Math.min(0.98, allBaseOpacity + 0.34);
      if (record?.executed) return Math.min(0.96, allBaseOpacity + 0.24);
      return Math.max(0.1, allBaseOpacity - 0.08);
    }
    function getNormalOpacity(record) {
      return Math.max(0.05, getBaseOpacityForRecord(record));
    }

    function buildPileRecords(rows) {
      const latestExecutionKey = getLatestExecutionDateKey(rows);
      return rows.map(row => {
        const lngLat = dltmToWgs84(row.design_x, row.design_y);
        if (!lngLat) return null;
        return {
          row,
          id: normalizeId(row.id),
          lngLat,
          radiusM: getPileRadiusMeters(row),
          heightM: getVisiblePileHeight(row),
          color: getPileColor(row, latestExecutionKey),
          executed: isExecutedRow(row),
          executedYesterday: isYesterdayExecutedRow(row, latestExecutionKey)
        };
      }).filter(Boolean);
    }

    function getPileCentroid(records) {
      if (!records.length) return DEFAULT_SITE_CENTER;
      const sum = records.reduce((acc, rec) => {
        acc[0] += rec.lngLat[0];
        acc[1] += rec.lngLat[1];
        return acc;
      }, [0, 0]);
      return [sum[0] / records.length, sum[1] / records.length];
    }

    function getPileBounds(records) {
      if (!records.length) return null;
      let minLng = Infinity;
      let maxLng = -Infinity;
      let minLat = Infinity;
      let maxLat = -Infinity;

      records.forEach(rec => {
        const lng = Number(rec?.lngLat?.[0]);
        const lat = Number(rec?.lngLat?.[1]);
        if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
        minLng = Math.min(minLng, lng);
        maxLng = Math.max(maxLng, lng);
        minLat = Math.min(minLat, lat);
        maxLat = Math.max(maxLat, lat);
      });

      if (!Number.isFinite(minLng) || !Number.isFinite(maxLng) || !Number.isFinite(minLat) || !Number.isFinite(maxLat)) {
        return null;
      }

      // Add small geographic padding so piles are not touching viewport edges.
      const lngPad = Math.max((maxLng - minLng) * 0.08, 0.0002);
      const latPad = Math.max((maxLat - minLat) * 0.08, 0.0002);

      return new mapboxgl.LngLatBounds(
        [minLng - lngPad, minLat - latPad],
        [maxLng + lngPad, maxLat + latPad]
      );
    }

    function todayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function currentShiftDateKey(offsetDays = 0) {
      const now = new Date();
      const shiftDate = new Date(now);
      const totalMinutes = shiftDate.getHours() * 60 + shiftDate.getMinutes();
      if (totalMinutes < (7 * 60)) {
        shiftDate.setDate(shiftDate.getDate() - 1);
      }
      if (offsetDays) {
        shiftDate.setDate(shiftDate.getDate() + offsetDays);
      }
      const y = shiftDate.getFullYear();
      const m = String(shiftDate.getMonth() + 1).padStart(2, '0');
      const d = String(shiftDate.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function aggregateDailyData(rows) {
      const byDay = new Map();
      rows.filter(isExecutedRow).forEach(row => {
        const dateKey = getExecutionDateKey(row);
        if (!dateKey) return;
        if (!byDay.has(dateKey)) byDay.set(dateKey, { date: dateKey, pileCount: 0, depth: 0, concreteQty: 0 });
        const item = byDay.get(dateKey);
        item.pileCount += 1;
        item.depth += parseNumber(row.asbuilt_depth);
        item.concreteQty += parseNumber(row.asbuilt_concreteQty);
      });

      const sorted = Array.from(byDay.values()).sort((a, b) => a.date.localeCompare(b.date));
      if (!sorted.length) return sorted;

      const startDate = new Date(sorted[0].date + 'T00:00:00');
      const endDate = new Date(currentShiftDateKey(-1) + 'T00:00:00');
      const lookup = new Map(sorted.map(d => [d.date, d]));
      const full = [];
      for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        full.push(lookup.get(key) || { date: key, pileCount: 0, depth: 0, concreteQty: 0 });
      }
      return full;
    }

    function getChartSeries(mode) {
      const scopedChartData = aggregateDailyData(getFocusedWidgetPiles());
      if (mode === 'daily') return scopedChartData;
      let piles = 0, depth = 0, qty = 0;
      return scopedChartData.map(d => {
        piles += Number(d.pileCount || 0);
        depth += Number(d.depth || 0);
        qty += Number(d.concreteQty || 0);
        return { date: d.date, pileCount: piles, depth: depth, concreteQty: qty };
      });
    }

    const progressCard = document.getElementById('progressCard');
    const progressRingValue = document.getElementById('progressRingValue');
    const progressPercent = document.getElementById('progressPercent');
    const progressExecuted = document.getElementById('progressExecuted');
    const progressRemaining = document.getElementById('progressRemaining');
    const progressTotal = document.getElementById('progressTotal');
    const chartCard = document.getElementById('chartCard');

    function renderProgressCard() {
      const scopedPiles = getFocusedWidgetPiles();
      const total = scopedPiles.length;
      const executed = scopedPiles.filter(isExecutedRow).length;
      const remaining = Math.max(0, total - executed);
      const percent = total ? (executed / total) * 100 : 0;
      const latestDate = scopedPiles.filter(isExecutedRow).map(p => normalizeDateString(p.castingDate)).filter(Boolean).sort().slice(-1)[0] || '';
      const radius = 40;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - percent / 100);
      progressRingValue.style.strokeDasharray = `${circumference}`;
      progressRingValue.style.strokeDashoffset = `${offset}`;
      progressPercent.textContent = `${percent.toFixed(1)}%`;
      progressExecuted.textContent = executed.toLocaleString();
      progressRemaining.textContent = remaining.toLocaleString();
      progressTotal.textContent = total.toLocaleString();

    function renderChart(metric = currentMetric) {
      if (!chartSvg || !chartMetricLabel || !chartLegendText || !chartMetricTotal || !chartDateRange) return;
      currentMetric = metric;
      const series = getChartSeries(currentChartMode);
      const labelMap = { pileCount: 'No Of Piles', depth: 'Depth', concreteQty: 'Concrete Quantity' };
      chartMetricLabel.textContent = labelMap[metric];
      chartLegendText.textContent = `${labelMap[metric]} ${currentChartMode === 'daily' ? 'per Day' : 'Cumulative'}`;
      chartButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.metric === metric));
      chartModeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === currentChartMode));

      if (!series.length) {
        chartMetricTotal.textContent = '0';
        chartDateRange.textContent = 'No data';
        chartSvg.innerHTML = `<text x="200" y="105" fill="rgba(255,255,255,0.56)" text-anchor="middle" font-size="12">No executed data</text>`;
        chartInteractivePoints = [];
        return;
      }

      const values = series.map(d => Number(d[metric] || 0));
      const total = currentChartMode === 'cumulative' ? values[values.length - 1] : values.reduce((a, b) => a + b, 0);
      chartMetricTotal.textContent = total.toLocaleString(undefined, { maximumFractionDigits: 2 });
      chartDateRange.textContent = `${formatDateLabel(series[0].date)} — ${formatDateLabel(series[series.length - 1].date)}`;

      const w = 400, h = 210, m = { top: 18, right: 18, bottom: 34, left: 40 };
      const innerW = w - m.left - m.right, innerH = h - m.top - m.bottom;
      const maxVal = Math.max(...values, 1), minVal = 0;
      const xFor = i => m.left + (series.length === 1 ? innerW / 2 : (i / (series.length - 1)) * innerW);
      const yFor = v => m.top + innerH - ((v - minVal) / (maxVal - minVal || 1)) * innerH;

      let linePath = '', areaPath = '', barsSvg = '';
      chartInteractivePoints = [];
      const barWidth = Math.max(4, Math.min(18, innerW / Math.max(1, series.length) * 0.7));

      series.forEach((d, i) => {
        const x = xFor(i), y = yFor(values[i]);
        linePath += `${i === 0 ? 'M' : 'L'} ${x.toFixed(2)} ${y.toFixed(2)} `;
        if (i === 0) areaPath = `M ${x.toFixed(2)} ${m.top + innerH} L ${x.toFixed(2)} ${y.toFixed(2)} `;
        else areaPath += `L ${x.toFixed(2)} ${y.toFixed(2)} `;
        if (currentChartMode === 'daily') {
          const hBar = m.top + innerH - y;
          barsSvg += `<rect data-chart-index="${i}" x="${(x - barWidth/2).toFixed(2)}" y="${y.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${Math.max(1, hBar).toFixed(2)}" rx="3" fill="rgba(232,214,17,0.85)" />`;
        }
        chartInteractivePoints.push({ x, y, data: d, value: values[i] });
      });
      const lastX = xFor(series.length - 1);
      areaPath += `L ${lastX.toFixed(2)} ${m.top + innerH} Z`;

      let gridSvg = '';
      for (let i = 0; i <= 4; i++) {
        const val = minVal + ((maxVal - minVal) * i / 4);
        const y = yFor(val);
        gridSvg += `<line x1="${m.left}" y1="${y}" x2="${w - m.right}" y2="${y}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
        gridSvg += `<text x="${m.left - 8}" y="${y + 4}" fill="rgba(255,255,255,0.58)" text-anchor="end" font-size="10">${val.toFixed(metric === 'pileCount' ? 0 : 1)}</text>`;
      }

      let xLabelsSvg = '';
      const labelCount = Math.min(series.length, 5);
      for (let i = 0; i < labelCount; i++) {
        const idx = Math.round((series.length - 1) * (labelCount === 1 ? 0 : i / (labelCount - 1)));
        const x = xFor(idx);
        xLabelsSvg += `<text x="${x}" y="${h - 12}" fill="rgba(255,255,255,0.58)" text-anchor="middle" font-size="10">${formatDateLabel(series[idx].date)}</text>`;
      }

      const barLabelsSvg = currentChartMode === 'daily'
        ? chartInteractivePoints.map((pt, idx) => {
          const label = metric === 'pileCount'
            ? `${Math.round(pt.value)}`
            : `${Number(pt.value).toLocaleString(undefined, { maximumFractionDigits: 1 })}`;
          return `<text data-chart-index="${idx}" x="${pt.x}" y="${Math.max(12, pt.y - 6)}" fill="rgba(255,255,255,0.92)" text-anchor="middle" font-size="10" font-weight="700">${label}</text>`;
        }).join('')
        : '';

      const pointsSvg = currentChartMode === 'cumulative'
        ? chartInteractivePoints.map((pt, idx) => (
          `<circle data-chart-index="${idx}" cx="${pt.x}" cy="${pt.y}" r="4.5" fill="var(--gold)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/>`
        )).join('')
        : '';

      chartSvg.innerHTML = `
        <defs>
          <linearGradient id="chartAreaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(232,214,17,0.42)"/>
            <stop offset="100%" stop-color="rgba(232,214,17,0.04)"/>
          </linearGradient>
        </defs>
        ${gridSvg}
        ${currentChartMode === 'cumulative'
          ? `<path d="${areaPath}" fill="url(#chartAreaGrad)"></path><path d="${linePath}" fill="none" stroke="var(--gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>`
          : barsSvg}
        ${barLabelsSvg}
        ${pointsSvg}
        ${xLabelsSvg}`;
    }

    function showChartTooltip(index, clientX, clientY) {
      const pt = chartInteractivePoints[index];
      if (!pt) return;
      chartTooltip.innerHTML = `
        <div class="tooltip-title">${formatDateLabel(pt.data.date)}</div>
        <div class="tooltip-row"><span class="tooltip-label">${chartMetricLabel.textContent}</span><span>${Number(pt.value).toLocaleString(undefined, { maximumFractionDigits: 2 })}</span></div>
        <div class="tooltip-row"><span class="tooltip-label">Mode</span><span>${currentChartMode === 'daily' ? 'Daily' : 'Cumulative'}</span></div>`;
      const rect = chartArea.getBoundingClientRect();
      const areaW = rect.width;
      const areaH = rect.height;
      const tipW = Math.max(160, Math.min(220, chartTooltip.offsetWidth || 180));
      const tipH = Math.max(72, chartTooltip.offsetHeight || 90);
      let left = clientX - rect.left + 10;
      let top = clientY - rect.top + 10;
      if (left + tipW > areaW - 8) left = areaW - tipW - 8;
      if (top + tipH > areaH - 8) top = areaH - tipH - 8;
      left = Math.max(8, left);
      top = Math.max(8, top);
      chartTooltip.style.left = `${left}px`;
      chartTooltip.style.top = `${top}px`;
      chartTooltip.classList.add('show');
    }

    if (chartArea) {
      chartArea.addEventListener('mousemove', (e) => {
        const target = e.target.closest('[data-chart-index]');
        if (!target) { chartTooltip.classList.remove('show'); return; }
        showChartTooltip(Number(target.getAttribute('data-chart-index')), e.clientX, e.clientY);
      });
      chartArea.addEventListener('mouseleave', () => chartTooltip.classList.remove('show'));
    }

    function setMapView(mode, options = {}) {
      const is3D = mode === '3d';
      planViewBtn.classList.toggle('active', !is3D);
      view3DBtn.classList.toggle('active', is3D);
      const scope = getActiveScope();
      const focusedRecords = buildPileRecords(getFocusedPiles(scope));
      const projectBounds = getPileBounds(focusedRecords);
      const focusedCenter = getPileCentroid(focusedRecords);
      const duration = options.instant ? 0 : (options.quick ? MAP_PREMIUM.camera.quickDuration : MAP_PREMIUM.camera.duration);
      const easing = MAP_PREMIUM.camera.easing;

      if (projectBounds) {
        map.fitBounds(projectBounds, {
          padding: is3D
            ? { top: 72, right: 58, bottom: 86, left: 58 }
            : { top: 54, right: 48, bottom: 54, left: 48 },
          maxZoom: is3D ? 18.28 : 17.58,
          pitch: is3D ? MAP_PREMIUM.camera.pitch3d : 0,
          bearing: is3D ? MAP_PREMIUM.camera.bearing3d : 0,
          duration,
          easing,
          essential: true
        });
        return;
      }

      map.easeTo({
        center: focusedCenter,
        zoom: is3D ? 18.18 : 17.36,
        pitch: is3D ? MAP_PREMIUM.camera.pitch3d : 0,
        bearing: is3D ? MAP_PREMIUM.camera.bearing3d : 0,
        duration,
        easing,
        essential: true
      });
    }

    function removeExternalSatelliteRasterLayer() {
      try {
        if (map.getLayer('external-satellite-raster')) map.removeLayer('external-satellite-raster');
      } catch (err) {}
      try {
        if (map.getSource('external-satellite-raster-src')) map.removeSource('external-satellite-raster-src');
      } catch (err) {}
    }

    function ensureExternalSatelliteRasterLayer() {
      if (!isSatellite || SATELLITE_RASTER_PROVIDER !== 'esri') {
        removeExternalSatelliteRasterLayer();
        return false;
      }

      if (!map.getSource('external-satellite-raster-src')) {
        map.addSource('external-satellite-raster-src', {
          type: 'raster',
          tiles: [
            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
          ],
          tileSize: 256,
          maxzoom: 19,
          attribution: 'Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
        });
      }

      if (!map.getLayer('external-satellite-raster')) {
        const styleLayers = map.getStyle()?.layers || [];
        const beforeLayerId = styleLayers.find(layer => layer.type !== 'background')?.id;
        map.addLayer({
          id: 'external-satellite-raster',
          type: 'raster',
          slot: 'bottom',
          source: 'external-satellite-raster-src',
          paint: {
            'raster-opacity': 0.96,
            'raster-fade-duration': 0,
            'raster-contrast': 0.03,
            'raster-saturation': -0.02
          }
        }, beforeLayerId);
      }

      return true;
    }

    function keepNativeLabelsAboveRaster() {
      if (!map.getLayer('external-satellite-raster')) return;
      const styleLayers = map.getStyle()?.layers || [];
      styleLayers
        .filter(layer => layer.type === 'symbol')
        .forEach(layer => {
          try { map.moveLayer(layer.id); } catch (err) {}
        });
    }

    function setSatelliteOverlayVisibility() {
      const styleLayers = map.getStyle()?.layers || [];
      styleLayers.forEach(layer => {
        if (!layer || layer.id === 'external-satellite-raster' || layer.id === 'sat-native-buildings') return;
        const id = String(layer.id || '').toLowerCase();
        const sourceLayer = String(layer['source-layer'] || '').toLowerCase();
        const sourceId = String(layer.source || '').toLowerCase();
        const isMapboxVectorOverlay =
          layer.type !== 'symbol' &&
          layer.type !== 'fill-extrusion' &&
          (sourceId.includes('mapbox') || sourceId.includes('composite') || !!sourceLayer);
        const isRoadOverlay =
          layer.type !== 'symbol' &&
          (
            id.includes('road') ||
            id.includes('street') ||
            id.includes('bridge') ||
            id.includes('tunnel') ||
            id.includes('traffic') ||
            sourceLayer.includes('road') ||
            sourceLayer.includes('transportation')
          );

        if (!isRoadOverlay && !isMapboxVectorOverlay) return;

        try {
          map.setLayoutProperty(layer.id, 'visibility', isSatellite ? 'none' : 'visible');
        } catch (err) {}
      });
    }

    function keepCustomLayersOnTop() {
      if (map.getLayer('sat-native-buildings')) {
        try {
          const styleLayers = map.getStyle()?.layers || [];
          const beforeLayerId = styleLayers.find(layer => layer.type === 'symbol' && layer.id !== 'sat-native-buildings')?.id;
          map.moveLayer('sat-native-buildings', beforeLayerId);
        } catch (err) {}
      }
      keepNativeLabelsAboveRaster();
      if (map.getLayer('threejs-piles')) {
        try { map.moveLayer('threejs-piles'); } catch (err) {}
      }
    }

      if (map.getLayer('sat-native-buildings')) return;
      if (!map.getSource('sat-buildings-src')) {
        map.addSource('sat-buildings-src', {
          type: 'vector',
          url: 'mapbox://mapbox.mapbox-streets-v8'
        });
      }
      try {
        const styleLayers = map.getStyle()?.layers || [];
        const beforeLayerId = styleLayers.find(layer => layer.type === 'symbol')?.id;
        map.addLayer({
          id: 'sat-native-buildings',
          type: 'fill-extrusion',
          source: 'sat-buildings-src',
          'source-layer': 'building',
          filter: ['==', ['geometry-type'], 'Polygon'],
          minzoom: 10,
          paint: {
            'fill-extrusion-color': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10, '#eef1f3',
              16, '#f7f2e9'
            ],
            'fill-extrusion-height': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10, 0,
              13,
              [
                'coalesce',
                ['to-number', ['get', 'height']],
                ['to-number', ['get', 'render_height']],
                ['*', ['coalesce', ['to-number', ['get', 'building:levels']], 0], 3],
                12
              ]
            ],
            'fill-extrusion-base': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10, 0,
              13,
              [
                'coalesce',
                ['to-number', ['get', 'min_height']],
                ['*', ['coalesce', ['to-number', ['get', 'min_level']], 0], 3],
                0
              ]
            ],
            'fill-extrusion-opacity': 0.78,
            'fill-extrusion-vertical-gradient': true,
            'fill-extrusion-emissive-strength': 0.02,
            'fill-extrusion-ambient-occlusion-intensity': 0.42,
            'fill-extrusion-flood-light-color': '#ffffff',
            'fill-extrusion-flood-light-intensity': 0.16
          }
        }, beforeLayerId);
      } catch (err) {
        console.warn('[SAT buildings] layer add failed', err);
      }
    }

    function recreateSatelliteBuildingsLayer() {
      try {
        if (map.getLayer('sat-native-buildings')) map.removeLayer('sat-native-buildings');
      } catch (err) {}
      try {
        if (map.getSource('sat-buildings-src')) map.removeSource('sat-buildings-src');
      } catch (err) {}
      ensureSatelliteNativeBuildingsLayer();
      keepCustomLayersOnTop();
    }

    function ensureSatelliteBuildingsWithRetry(attempt = 0) {
      if (!isSatellite) return;
      ensureSatelliteNativeBuildingsLayer();
      keepCustomLayersOnTop();
      if (map.getLayer('sat-native-buildings')) return;
      if (attempt >= 8) return;
      window.setTimeout(() => ensureSatelliteBuildingsWithRetry(attempt + 1), 180);
    }

    function getPreferredViewMode() {
      if (isSatellite) return '3d';
      return view3DBtn.classList.contains('active') ? '3d' : '2d';
    }

    function focusCurrentProject(instant = false) {
      const mode = getPreferredViewMode();
      setMapView(mode, { instant });
    }

    function finalizeStyleLoad() {
      rebuildOperationalMapLayers();
      requestAnimationFrame(() => focusCurrentProject(true));
      map.once('idle', () => {
        if (isSatellite) ensureSatelliteBuildingsWithRetry();
        else keepCustomLayersOnTop();
        focusCurrentProject(true);
        requestAnimationFrame(() => {
          if (isSatellite) ensureSatelliteBuildingsWithRetry();
          else keepCustomLayersOnTop();
        });
      });
    }

      }

      map.setStyle(getSatelliteStyleObject());
    });

    function makeInfoSection(title, rows) {

        <div class="info-row">
          <div class="info-label">${escapeHtml(label)}</div>
          <div class="info-value">${escapeHtml(value || '—')}</div>
        </div>`).join('');
      return `<div class="panel-section"><div class="panel-section-title">${escapeHtml(title)}</div>${body}</div>`;
    }

          ['Pile ID', row.id],
          ['Project', row.project],
          ['Plot', row.plot || '—']
        ])}
        ${makeInfoSection('Design', [
          ['Pile Type', row.pileType || '—'],
          ['Diameter (mm)', displayValue(row.diameter, 0)],
          ['X', displayFixed(row.design_x, 3)],
          ['Y', displayFixed(row.design_y, 3)],
          ['Top Of Bar', displaySigned(row.design_topOfBar, 2)],
          ['Cutoff Level', displaySigned(row.design_cutoffLevel, 2)],
          ['Toe Level', displaySigned(row.design_toeLevel, 2)],

    function refreshPileAppearance() {
      if (!pileLayer) return;
      pileLayer.meshes.forEach(mesh => {
        const record = mesh.userData.record;
        const isSelected = record.id === pileLayer.highlightedId;
        const isHovered = record.id === pileLayer.hoveredId;
        if (isSelected || isHovered) return;
        mesh.material.color.setHex(record.color);
        if (record.executed) {
          mesh.material.emissive = new THREE.Color(record.executedYesterday ? MAP_PREMIUM.colors.yesterdayEmissive : MAP_PREMIUM.colors.executedEmissive);
          mesh.material.emissiveIntensity = record.executedYesterday ? 0.62 : 0.34;
        } else {
          mesh.material.emissive = new THREE.Color(MAP_PREMIUM.colors.remainingEmissive);

    }

    function disposeThreeNode(node) {
      if (!node) return;
      if (node.geometry) node.geometry.dispose();
      if (node.material) {
        if (Array.isArray(node.material)) node.material.forEach(mat => mat && mat.dispose && mat.dispose());
        else if (node.material.dispose) node.material.dispose();
      }
    }
    function build3DTestIndicator(record) {
      const testType = getTestType(record.row);
      if (!testType) return null;
      const size = record.radiusM * 1.16;
      const zOffset = 0.10;
      if (testType === 'sonic') {
        const geometry = new THREE.RingGeometry(size * 0.90, size * 1.02, 56);
        const material = new THREE.MeshBasicMaterial({
          color: 0x2D7FF9,
          transparent: true,
          opacity: 0.98,
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(record._local3d.x, record._local3d.y, zOffset);
        mesh.renderOrder = 1200;
        return mesh;
      }
      const points = [
        new THREE.Vector3(-size, -size, 0),
        new THREE.Vector3(size, -size, 0),
        new THREE.Vector3(size, size, 0),
        new THREE.Vector3(-size, size, 0),
        new THREE.Vector3(-size, -size, 0)
      ];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0xB784D7,
        transparent: true,
        opacity: 0.98,
        depthTest: false,
        depthWrite: false
      });
      const line = new THREE.Line(geometry, material);
      line.position.set(record._local3d.x, record._local3d.y, zOffset);
      line.renderOrder = 1200;
      return line;
    }

    class ThreePileLayer {
      constructor(id) {
        this.id = id;
        this.type = 'custom';
        this.renderingMode = '2d';
        this.map = null;
        this.camera = null;
        this.scene = null;
        this.renderer = null;
        this.rootGroup = null;
        this.meshes = [];
        this.testIndicators = [];
        this.combinedMatrix = null;
        this.highlightedId = null;
        this.hoveredId = null;
        this.isSatelliteMode = false;
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        this.centerMerc = mapboxgl.MercatorCoordinate.fromLngLat(SITE_CENTER, 0);
        this.modelTransform = {
          translateX: this.centerMerc.x,
          translateY: this.centerMerc.y,
          translateZ: 0,
          scale: this.centerMerc.meterInMercatorCoordinateUnits()
        };
      }

      onAdd(map, gl) {
        this.map = map;
        this.camera = new THREE.Camera();
        this.scene = new THREE.Scene();
        this.rootGroup = new THREE.Group();
        this.scene.add(this.rootGroup);

        const ambient = new THREE.AmbientLight(0xffffff, 0.85);
        this.scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xfffbf0, 1.18);
        sun.position.set(90, -90, 145);
        this.scene.add(sun);
        const fill = new THREE.DirectionalLight(0xdcecff, 0.42);
        fill.position.set(-70, 55, 105);
        this.scene.add(fill);

        this.renderer = new THREE.WebGLRenderer({
          canvas: map.getCanvas(),
          context: gl,
          antialias: true
        });
        this.renderer.autoClear = false;
        this.renderer.sortObjects = false;
        this.buildPiles();
      }

      buildPiles() {
        while (this.rootGroup.children.length) {
          const child = this.rootGroup.children.pop();
          disposeThreeNode(child);
        }
        this.meshes = [];
        this.testIndicators = [];

        pileRecords.forEach(record => {
          const merc = mapboxgl.MercatorCoordinate.fromLngLat(record.lngLat, 0);
          const localX = (merc.x - this.centerMerc.x) / this.modelTransform.scale;
          const localY = (merc.y - this.centerMerc.y) / this.modelTransform.scale;
          const radius = record.radiusM;
          const height = record.heightM;
          const geometry = new THREE.CylinderGeometry(radius, radius, height, PILE_SEGMENTS, 1, false);
          geometry.rotateX(Math.PI / 2);
          const material = new THREE.MeshPhongMaterial({
            color: record.color,
            transparent: true,
            opacity: getNormalOpacity(record),
            shininess: 145,
            specular: 0xcfd7df,
            flatShading: false,
            side: THREE.DoubleSide,
            depthTest: false,
            depthWrite: false
          });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.userData.record = record;
          mesh.userData.originalHeight = height;
          mesh.position.set(localX, localY, -(height / 2 + 0.02));
          record._local3d = { x: localX, y: localY, zCenter: -(height / 2 + 0.02), height, effectiveHeight: height, radius, topZ: -0.02 };
          mesh.frustumCulled = false;
          mesh.renderOrder = 999;
          this.rootGroup.add(mesh);
          this.meshes.push(mesh);

          const indicator = build3DTestIndicator(record);
          if (indicator) {
            this.rootGroup.add(indicator);
            this.testIndicators.push(indicator);
          }
        });
        this.applySatelliteMode(this.isSatelliteMode);
      }

      applySatelliteMode(enabled) {
        this.isSatelliteMode = !!enabled;
        this.meshes.forEach(mesh => {
          const record = mesh.userData.record;
          const originalHeight = Number(mesh.userData.originalHeight || record?._local3d?.height || 0);
          if (!originalHeight || !record?._local3d) return;
          const visibleHeight = originalHeight;
          mesh.scale.z = visibleHeight / originalHeight;
          mesh.position.z = -(visibleHeight / 2 + 0.02);
          record._local3d.effectiveHeight = visibleHeight;
          record._local3d.zCenter = mesh.position.z;
        });
        if (this.map) this.map.triggerRepaint();
      }

      setHighlightedPile(recordId) {
        if (this.highlightedId === recordId) return;
        this.highlightedId = recordId;
        this.meshes.forEach(mesh => {
          const record = mesh.userData.record;
          const isSelected = record.id === recordId;
          const isExecuted = record.executed;
          if (isSelected) {
            const selectedColor = isExecuted ? (record.executedYesterday ? 0xffc162 : 0x38ff9d) : MAP_PREMIUM.colors.selected;
            const emissiveColor = isExecuted ? (record.executedYesterday ? MAP_PREMIUM.colors.yesterdayEmissive : MAP_PREMIUM.colors.executedEmissive) : MAP_PREMIUM.colors.remainingEmissive;
            mesh.material.color.setHex(selectedColor);
            mesh.material.emissive = new THREE.Color(emissiveColor);
            mesh.material.emissiveIntensity = record.executedYesterday ? 1.0 : 0.88;
            mesh.material.opacity = 0.92;
          } else {
            mesh.material.color.setHex(record.color);
            mesh.material.emissive = new THREE.Color(record.executedYesterday ? MAP_PREMIUM.colors.yesterdayEmissive : (record.executed ? MAP_PREMIUM.colors.executedEmissive : MAP_PREMIUM.colors.remainingEmissive));
            mesh.material.emissiveIntensity = record.executedYesterday ? 0.62 : (record.executed ? 0.34 : 0.03);
            mesh.material.opacity = getNormalOpacity(record);
          }
        });
        this.map.triggerRepaint();
      }

      setHoverPile(recordId) {
        if (this.hoveredId === recordId) return;
        this.hoveredId = recordId;
        this.meshes.forEach(mesh => {
          const record = mesh.userData.record;
          const isSelected = record.id === this.highlightedId;
          const isHovered = record.id === recordId && !isSelected;
          if (isSelected) return;
          if (isHovered) {
            const hoverColor = record.executed ? (record.executedYesterday ? 0xffc162 : 0x36ff9c) : 0xffffff;
            const hoverEmissive = record.executed ? (record.executedYesterday ? MAP_PREMIUM.colors.yesterdayEmissive : MAP_PREMIUM.colors.executedEmissive) : MAP_PREMIUM.colors.remainingEmissive;
            mesh.material.color.setHex(hoverColor);
            mesh.material.emissive = new THREE.Color(hoverEmissive);
            mesh.material.emissiveIntensity = record.executedYesterday ? 0.86 : 0.58;
            mesh.material.opacity = Math.min(0.94, getNormalOpacity(record) + 0.2);
          } else {
            mesh.material.color.setHex(record.color);
            mesh.material.emissive = new THREE.Color(record.executedYesterday ? MAP_PREMIUM.colors.yesterdayEmissive : (record.executed ? MAP_PREMIUM.colors.executedEmissive : MAP_PREMIUM.colors.remainingEmissive));
            mesh.material.emissiveIntensity = record.executedYesterday ? 0.62 : (record.executed ? 0.34 : 0.03);
            mesh.material.opacity = getNormalOpacity(record);
          }
        });
        this.map.triggerRepaint();
      }

      pick(point) {
        const canvas = this.map.getCanvas();
        this.mouse.x = (point.x / canvas.clientWidth) * 2 - 1;
        this.mouse.y = -((point.y / canvas.clientHeight) * 2 - 1);
        this.raycaster.setFromCamera(this.mouse, this.camera);
        const hits = this.raycaster.intersectObjects(this.meshes, false);
        if (!hits.length) return null;
        return hits[0].object.userData.record || null;
      }

      projectLocalPointToScreen(localPoint) {
        if (!this.combinedMatrix) return null;
        const canvas = this.map.getCanvas();
        const v = localPoint.clone().applyMatrix4(this.combinedMatrix);
        if (!Number.isFinite(v.x) || !Number.isFinite(v.y) || !Number.isFinite(v.z)) return null;
        return {
          x: (v.x * 0.5 + 0.5) * canvas.clientWidth,
          y: (-v.y * 0.5 + 0.5) * canvas.clientHeight,
          z: v.z
        };
      }

      pickByBody(point, maxDistancePx = 16) {
        let nearest = null;
        let nearestDistance = Infinity;
        for (const record of pileRecords) {
          if (!record._local3d) continue;
          const top = this.projectLocalPointToScreen(new THREE.Vector3(record._local3d.x, record._local3d.y, record._local3d.topZ || -0.02));
          const bodyHeight = Number(record._local3d.effectiveHeight || record._local3d.height || 0);
          const bottom = this.projectLocalPointToScreen(new THREE.Vector3(record._local3d.x, record._local3d.y, -bodyHeight));
          if (!top || !bottom) continue;
          const side = this.projectLocalPointToScreen(new THREE.Vector3(record._local3d.x + record._local3d.radius, record._local3d.y, record._local3d.topZ || -0.02));
          const radiusPx = side ? Math.max(6, Math.hypot(side.x - top.x, side.y - top.y)) : 8;
          const distance = distancePointToSegment(point, top, bottom) - radiusPx;
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearest = record;
          }
        }
        return nearestDistance <= maxDistancePx ? nearest : null;
      }

      render(gl, matrix) {
        const m = new THREE.Matrix4().fromArray(matrix);
        const l = new THREE.Matrix4()
          .makeTranslation(this.modelTransform.translateX, this.modelTransform.translateY, this.modelTransform.translateZ)
          .scale(new THREE.Vector3(this.modelTransform.scale, this.modelTransform.scale, this.modelTransform.scale));
        this.combinedMatrix = m.clone().multiply(l);
        this.camera.projectionMatrix = this.combinedMatrix.clone();
        this.camera.projectionMatrixInverse.copy(this.camera.projectionMatrix).invert();
        this.renderer.resetState();
        this.renderer.render(this.scene, this.camera);
      }
    }

    class ThreeBuildingLayer {
      constructor(id) {
        this.id = id;
        this.type = 'custom';
        this.renderingMode = '3d';
        this.map = null;
        this.camera = null;
        this.scene = null;
        this.renderer = null;
        this.modelTransform = null;
        this.centerMerc = null;
        this._visible = false;
        this._built = false;
        this._loading = false;
        this._stats = { features: 0, triangles: 0 };
        this._lastError = '';
        this._lastSource = '';
      }

      onAdd(map, gl) {
        this.map = map;
        this.camera = new THREE.Camera();
        this.scene = new THREE.Scene();
        const ambient = new THREE.AmbientLight(0xffffff, 1.15);
        this.scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xfff7db, 0.9);
        sun.position.set(80, -70, 120);
        this.scene.add(sun);
        const fill = new THREE.DirectionalLight(0xd9e7ff, 0.45);
        fill.position.set(-60, 40, 90);
        this.scene.add(fill);
        this.renderer = new THREE.WebGLRenderer({ canvas: map.getCanvas(), context: gl, antialias: true });
        this.renderer.autoClear = false;
        this.centerMerc = mapboxgl.MercatorCoordinate.fromLngLat(SITE_CENTER, 0);
        this.modelTransform = {
          translateX: this.centerMerc.x,
          translateY: this.centerMerc.y,
          translateZ: 0,
          scale: this.centerMerc.meterInMercatorCoordinateUnits()
        };
      }

      async _fetchGeoJson() {
        this._lastSource = 'raw-github-url';
        const res = await fetch(BUILDINGS_RAW_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Raw URL HTTP ${res.status}`);
        const contentType = String(res.headers.get('content-type') || '');
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch (parseErr) {
          throw new Error(`Raw URL parse failed (${contentType || 'no content-type'})`);
        }
      }

      async loadAndBuild(onDone) {
        if (this._built || this._loading) { if (onDone) onDone(this._built); return; }
        this._loading = true;
        this._lastError = '';
        try {
          console.log('[Buildings] fetching…');
          const data = await this._fetchGeoJson();
          const features = Array.isArray(data?.features)
            ? data.features
            : Array.isArray(data?.body)
            ? data.body
            : [];
          console.log('[Buildings] features', features.length);
          this._buildGeometry(features);
        } catch (e) {
          this._lastError = e && e.message ? e.message : String(e);
          console.error('[Buildings] load error:', e);
        }
        this._loading = false;
        if (onDone) onDone(this._built);
      }

      _buildGeometry(features) {
        const cx = this.centerMerc.x;
        const cy = this.centerMerc.y;
        const scale = this.modelTransform.scale;

        const positions = [];
        const indices = [];
        let usedFeatureCount = 0;

        for (const feature of features) {
          if (!feature.geometry) continue;
          const zMin = Number((feature.properties && feature.properties.Z_Min) ?? (feature.properties && feature.properties.z_min) ?? 0) || 0;
          const polys = feature.geometry.type === 'MultiPolygon'
            ? feature.geometry.coordinates
            : feature.geometry.type === 'Polygon'
            ? [feature.geometry.coordinates]
            : [];

          for (const poly of polys) {
            const ring = poly[0];
            if (!ring || ring.length < 4) continue;
            usedFeatureCount += 1;
            const verts = ring.slice(0, -1); // drop closing vertex
            const base = positions.length / 3;
            for (const coord of verts) {
              const lng = Number(coord[0]);
              const lat = Number(coord[1]);
              const z = coord[2] !== undefined ? Number(coord[2]) : zMin;
              if (!Number.isFinite(lng) || !Number.isFinite(lat)) continue;
              const merc = mapboxgl.MercatorCoordinate.fromLngLat([lng, lat], 0);
              positions.push(
                (merc.x - cx) / scale,
                (merc.y - cy) / scale,
                ((Number.isFinite(z) ? z : zMin) - zMin) + BUILDING_BASE_Z_M
              );
            }
            const count = (positions.length / 3) - base;
            for (let i = 1; i < count - 1; i++) {
              indices.push(base, base + i, base + i + 1);
            }
          }
        }

        if (!positions.length) return;

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        const mesh = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({
          color: 0xf2eee6,
          transparent: true,
          opacity: 0.86,
          shininess: 95,
          specular: 0xffffff,
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false
        }));
        mesh.frustumCulled = false;
        mesh.renderOrder = 990;
        this.scene.add(mesh);

        this._built = true;
        this._stats = { features: usedFeatureCount, triangles: Math.floor(indices.length / 3) };
        if (this.map) this.map.triggerRepaint();
      }

      getStats() {
        return this._stats;
      }

      getLastError() {
        return this._lastError;
      }

      getLastSource() {
        return this._lastSource;
      }

      setVisible(visible) {
        this._visible = visible;
        if (this.map) this.map.triggerRepaint();
      }

      render(gl, matrix) {
        if (!this._visible || !this._built) return;
        const m = new THREE.Matrix4().fromArray(matrix);
        const l = new THREE.Matrix4()
          .makeTranslation(this.modelTransform.translateX, this.modelTransform.translateY, this.modelTransform.translateZ)
          .scale(new THREE.Vector3(this.modelTransform.scale, this.modelTransform.scale, this.modelTransform.scale));
        this.camera.projectionMatrix = m.clone().multiply(l);
        this.camera.projectionMatrixInverse.copy(this.camera.projectionMatrix).invert();
        this.renderer.clearDepth();
        this.renderer.resetState();
        this.renderer.render(this.scene, this.camera);
      }
    }

    function distancePointToSegment(point, a, b) {
      const abx = b.x - a.x, aby = b.y - a.y;
      const abLen2 = abx * abx + aby * aby;
      if (abLen2 === 0) return Math.hypot(point.x - a.x, point.y - a.y);
      const t = Math.max(0, Math.min(1, ((point.x - a.x) * abx + (point.y - a.y) * aby) / abLen2));
      const projX = a.x + t * abx;
      const projY = a.y + t * aby;
      return Math.hypot(point.x - projX, point.y - projY);
    }

    function getNearestPileRecordFromPoint(point, maxDistancePx = 30) {
      let nearest = null, nearestDistance = Infinity;
      for (const record of pileRecords) {
        const projected = map.project(record.lngLat);
        const dx = projected.x - point.x, dy = projected.y - point.y;
        const distance = Math.hypot(dx, dy);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = record;
        }
      }
      return nearestDistance <= maxDistancePx ? nearest : null;
    }

    function getPileRecordFromInteraction(point, nearestMaxPx = 34) {
      const raycastRecord = pileLayer.pick(point);
      if (raycastRecord) return raycastRecord;
      const bodyRecord = pileLayer.pickByBody(point, 18);
      if (bodyRecord) return bodyRecord;
      return getNearestPileRecordFromPoint(point, nearestMaxPx);
    }

    let htmlPileLabels = [];

    function clearHtmlLabels() {
      htmlPileLabels.forEach(m => m.remove());
      htmlPileLabels = [];
    }

    function addLabelLayer() {
      clearHtmlLabels();

      pileRecords.forEach(record => {
